<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Zhongqin stream</title>
    <link rel="stylesheet" href="404.css">
</head>
<body>
    <div class="container">
        <div class="glitch-wrapper">
            <div class="glitch" data-text="404">404</div>
        </div>
        
        <div class="message">
            <h2>Lost in the cinema?</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <p class="subtle">Maybe the movie was just that good...</p>
        </div>
        
        <div class="film-strip">
            <div class="film-frame"></div>
            <div class="film-frame"></div>
            <div class="film-frame"></div>
            <div class="film-frame"></div>
            <div class="film-frame"></div>
        </div>
        
        <a href="/" class="home-button">
            <span>Back to Zhongqin stream</span>
        </a>
        
        <div class="floating-popcorn">
            <div class="popcorn"></div>
            <div class="popcorn"></div>
            <div class="popcorn"></div>
        </div>
    </div>
</body>
</html>
