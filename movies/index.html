<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhongqin Stream - Watch Free Movies Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Zhongqin Stream</h1>
        <p>Watch thousands of movies instantly. No signup required.</p>
        
        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search movies..." />
            <button id="search-btn">Search</button>
        </div>
    </header>

    <main>
        <div class="movie-grid" id="movie-grid">
            <div class="movie-card" data-movie="inception">
                <img src="https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5UUF.jpg" alt="Inception">
                <h3>Inception</h3>
                <button class="watch-btn">Watch Now</button>
            </div>
            <div class="movie-card" data-movie="interstellar">
                <img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" alt="Interstellar">
                <h3>Interstellar</h3>
                <button class="watch-btn">Watch Now</button>
            </div>
            <div class="movie-card" data-movie="matrix">
                <img src="https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg" alt="The Matrix">
                <h3>The Matrix</h3>
                <button class="watch-btn">Watch Now</button>
            </div>
        </div>
        
        <!-- More Button -->
        <div class="more-container">
            <button id="more-btn">More Movies</button>
        </div>
    </main>

    <footer>
        <p>Zhongqin Stream does not host any content. All rights belong to their respective owners.</p>
    </footer>

    <script src="tracker.js"></script>
    <script src="script.js"></script>
</body>
</html>
